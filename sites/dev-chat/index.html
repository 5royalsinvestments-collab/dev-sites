<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev — Chat & Build Websites</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#0f1722;color:#e8edf3}
  .wrap{max-width:760px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
  header{background:linear-gradient(135deg,#1c3a2e,#0f1722);padding:18px 20px;border-bottom:1px solid #214a39}
  header h1{margin:0;font-size:19px}
  header p{margin:4px 0 0;font-size:13px;color:#9fc4b0}
  #msgs{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px}
  .m{max-width:84%;padding:12px 15px;border-radius:14px;font-size:15px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
  .bot{background:#16241c;border:1px solid #214a39;align-self:flex-start;border-bottom-left-radius:4px}
  .me{background:#2f9e6b;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
  .m a{color:#7fe3b0;font-weight:700}
  form{display:flex;gap:8px;padding:14px;background:#13201a;border-top:1px solid #214a39}
  #inp{flex:1;padding:13px;border:1px solid #2a5c45;border-radius:10px;font-size:15px;background:#0f1722;color:#e8edf3;outline:none}
  .send{background:#2f9e6b;color:#fff;border:none;padding:0 20px;border-radius:10px;font-weight:700;cursor:pointer}
  .typing{align-self:flex-start;color:#7fae93;font-size:20px;letter-spacing:2px}
  .bar{padding:8px 18px;background:#0f1722;font-size:12px;color:#7e9a8b;display:flex;justify-content:space-between;align-items:center}
  .bar button{background:none;border:1px solid #2a5c45;color:#9fc4b0;border-radius:16px;padding:5px 11px;font-size:12px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>🤖 Dev Callahan — Web Builder</h1><p>Chat to build a page, then say "make it blue" or "add pricing" — he updates it live.</p></header>
  <div id="msgs"></div>
  <div class="bar"><span id="sess"></span><button id="new">+ Start a new page</button></div>
  <form id="f"><input id="inp" placeholder="e.g. Build a landing page for my coffee shop…" autocomplete="off"><button class="send" type="submit">Send</button></form>
</div>
<script>
(function(){
  var EP="https://tradesuiteai.app.n8n.cloud/webhook/dev-chat";
  var msgs=document.getElementById("msgs"), hist=[];
  function sid(){var s=localStorage.getItem("dev_session");if(!s){s="web"+Math.floor(Math.random()*1e9).toString(36);localStorage.setItem("dev_session",s);}return s;}
  var session=sid();
  document.getElementById("sess").textContent="Page session: "+session;
  function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;");}
  function link(s){return esc(s).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');}
  function add(role,text){var d=document.createElement("div");d.className="m "+(role==="user"?"me":"bot");d.innerHTML=link(text);msgs.appendChild(d);msgs.scrollTop=msgs.scrollHeight;}
  add("bot","Hey Ed — I'm Dev. Tell me what to build (a landing page, sales page, coming-soon, anything), and I'll publish it and send you the link. Then just chat to refine it — colors, sections, copy, whatever. What are we building?");
  document.getElementById("new").onclick=function(){localStorage.removeItem("dev_session");location.reload();};
  function send(t){add("user",t);hist.push({role:"user",content:t});
    var typ=document.createElement("div");typ.className="typing";typ.textContent="building •••";msgs.appendChild(typ);msgs.scrollTop=msgs.scrollHeight;
    fetch(EP,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({session:session,messages:hist.slice(-16)})})
      .then(function(r){return r.json();}).then(function(j){typ.remove();var rep=(j&&j.reply)||"Hmm, try that again.";add("bot",rep);hist.push({role:"assistant",content:rep});})
      .catch(function(){typ.remove();add("bot","Connection hiccup — try again in a sec.");});}
  document.getElementById("f").onsubmit=function(e){e.preventDefault();var inp=document.getElementById("inp");var t=inp.value.trim();if(!t)return;inp.value="";send(t);};
})();
</script>
</body>
</html>
