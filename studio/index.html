<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Dev Studio · 5R</title>
<style>
*{box-sizing:border-box}
:root{--bg:#0f1115;--panel:#161922;--line:#232733;--blue:#2b6cff;--ink:#e7e7ea;--mut:#8a90a2}
html,body{margin:0;height:100%;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}
.app{display:flex;height:100dvh}
.left{display:flex;flex-direction:column;width:44%;min-width:340px;border-right:1px solid var(--line)}
.head{padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}
.head b{font-size:16px}.head .sub{font-size:11.5px;color:var(--mut)}
.head button{background:#222634;color:#cdd3e0;border:0;border-radius:8px;padding:8px 12px;font-weight:600;cursor:pointer}
#log{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:92%;padding:10px 13px;border-radius:13px;line-height:1.5;font-size:14.5px;white-space:pre-wrap;word-wrap:break-word}
.me{align-self:flex-end;background:var(--blue);color:#fff;border-bottom-right-radius:3px}
.dev{align-self:flex-start;background:#1b1f2a;border:1px solid var(--line);border-bottom-left-radius:3px}
.act{align-self:flex-start;font-size:12px;color:#9aa3b8;background:#141822;border:1px solid var(--line);border-radius:8px;padding:6px 10px}
.act a{color:#7fd1ff}
.bar{padding:11px;border-top:1px solid var(--line);background:var(--panel)}
.row{display:flex;gap:8px;align-items:flex-end}
textarea{flex:1;background:var(--bg);color:var(--ink);border:1px solid #2a2f3d;border-radius:10px;padding:11px;font:inherit;font-size:15px;resize:none;max-height:130px}
.send{background:var(--blue);color:#fff;border:0;border-radius:10px;padding:11px 16px;font-weight:600;cursor:pointer}
.attach{background:#222634;color:#cdd3e0;border:0;border-radius:10px;padding:11px 13px;cursor:pointer}
.files{font-size:12px;color:var(--mut);margin-top:6px;min-height:14px}
.right{flex:1;display:flex;flex-direction:column;background:#fff;min-width:0}
.pbar{padding:8px 10px;background:var(--panel);color:#cdd3e0;font-size:12px;display:flex;gap:6px;align-items:center;border-bottom:1px solid var(--line)}
.pbar input{flex:1;min-width:0;background:var(--bg);color:#9aa3b8;border:1px solid #2a2f3d;border-radius:6px;padding:6px}
.pbar button{background:#222634;color:#cdd3e0;border:0;border-radius:6px;padding:6px 9px;cursor:pointer}
iframe{flex:1;border:0;background:#fff}
.dots:after{content:'';animation:d 1.4s infinite}@keyframes d{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
.tabbar{display:none}
@media(max-width:820px){
  .app{flex-direction:column}
  .left,.right{width:100%;min-width:0}
  .left{height:100dvh}.right{display:none;height:100dvh}
  .app.showsite .left{display:none}.app.showsite .right{display:flex}
  .tabbar{display:flex;gap:6px}
}
</style></head>
<body>
<div class="app" id="app">
  <div class="left">
    <div class="head">
      <div><b>🛠️ Dev Studio</b><div class="sub">Dev Callahan · your AI web builder</div></div>
      <div style="display:flex;gap:6px">
        <div class="tabbar"><button onclick="showSite(true)" id="tabSite">🌐 Site</button></div>
        <button onclick="reset()">New</button>
      </div>
    </div>
    <div id="log"></div>
    <div class="bar">
      <div class="row">
        <textarea id="inp" rows="2" placeholder="Tell Dev what to build… paste a site to match, or 📎 attach a PDF/brand sheet"></textarea>
        <button class="attach" onclick="document.getElementById('file').click()">📎</button>
        <button class="send" id="sendb" onclick="send()">Send</button>
      </div>
      <input id="file" type="file" multiple style="display:none" onchange="pick()">
      <div class="files" id="files"></div>
    </div>
  </div>
  <div class="right">
    <div class="pbar">
      <button class="tabbar" onclick="showSite(false)">‹ Chat</button>
      <span>Live site</span>
      <input id="purl" readonly placeholder="(nothing built yet)">
      <button onclick="if(pv.src)pv.src=pv.src">↻</button>
      <button onclick="if(pv.src)window.open(pv.src)">↗</button>
    </div>
    <iframe id="pv" name="pv"></iframe>
  </div>
</div>
<script>
var WEBHOOK="https://tradesuiteai.app.n8n.cloud/webhook/dev-studio";
var SUPA="https://vbovqprbmuxkwazumndu.supabase.co";
var PUB="sb_publishable_OcljyjrO3SLJQxGe6xtNPA_vtkH6FnE";
var messages=[], pending=[], busy=false;
var log=document.getElementById('log'), pv=document.getElementById('pv'), app=document.getElementById('app');
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function md(s){return esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/(https?:\/\/[^\s)]+)/g,'<a href="$1" target="_blank">$1</a>');}
function add(cls,html){var d=document.createElement('div');d.className='msg '+cls;d.innerHTML=html;log.appendChild(d);log.scrollTop=log.scrollHeight;return d;}
function greet(){add('dev',"Hey Ed — I'm Dev. Tell me what to build and I'll design it: a landing page, a full multi-page site, whatever you need. Paste a site to match the vibe (\"make it like https://…\"), or 📎 attach a PDF/brand sheet and I'll use the real details. I'll publish it live and the preview shows up on the right. 🏗️");}
function showSite(b){app.classList.toggle('showsite',b);}
function setPreview(u){if(!u)return;document.getElementById('purl').value=u;pv.src=u;}
function pick(){var f=document.getElementById('file').files;pending=[];var n=[];for(var i=0;i<f.length;i++){(function(file){n.push(file.name);var r=new FileReader();r.onload=function(){pending.push({name:file.name,b64:r.result.split(',')[1]});};r.readAsDataURL(file);})(f[i]);}document.getElementById('files').textContent=n.length?('📎 '+n.join(', ')):'';}
function rid(){return 'web-'+Date.now()+'-'+Math.floor(Math.random()*1e5);}
async function poll(id,waitEl){
  var t0=Date.now();
  for(var i=0;i<120;i++){
    await new Promise(r=>setTimeout(r,3000));
    try{
      var rows=await (await fetch(SUPA+'/rest/v1/dev_chat_results?request_id=eq.'+id+'&select=reply,url,actions,done',{headers:{apikey:PUB}})).json();
      if(rows&&rows[0]&&rows[0].done){return rows[0];}
    }catch(e){}
    waitEl.innerHTML='Dev is working<span class="dots"></span> ('+Math.round((Date.now()-t0)/1000)+'s)';
  }
  return null;
}
async function send(){
  if(busy)return;
  var inp=document.getElementById('inp');var text=inp.value.trim();if(!text&&!pending.length)return;
  busy=true;var b=document.getElementById('sendb');b.disabled=true;b.textContent='…';
  add('me',md(text)+(pending.length?'<div style="font-size:12px;opacity:.7;margin-top:4px">📎 '+pending.map(p=>p.name).join(', ')+'</div>':''));
  messages.push({role:'user',content:text});
  var files=pending;pending=[];document.getElementById('files').textContent='';inp.value='';
  var wait=add('act','Dev is working<span class="dots"></span>');
  var id=rid();
  try{
    await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({request_id:id,messages:messages,files:files})});
    var res=await poll(id,wait);
    wait.remove();
    if(!res){add('act','⚠️ That took too long — your site may still finish building. Try again or check the preview link.');}
    else{
      (res.actions||[]).forEach(a=>add('act',md(a)));
      if(res.url){setPreview(res.url);}
      add('dev',md(res.reply||'(done)'));
      messages.push({role:'assistant',content:res.reply||''});
      if(res.url&&window.innerWidth<=820){add('act','📱 <a href="#" onclick="showSite(true);return false">Tap to view your site →</a>');}
    }
  }catch(e){wait.remove();add('act','⚠️ '+e);}
  busy=false;b.disabled=false;b.textContent='Send';
}
function reset(){messages=[];log.innerHTML='';pv.src='about:blank';document.getElementById('purl').value='';greet();}
document.getElementById('inp').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
greet();
</script>
</body></html>
